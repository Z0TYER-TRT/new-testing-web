<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processing Your Request</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="referrer" content="no-referrer">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="stylesheet" href="/style.css">
    <!-- Security headers via meta tags -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self';">
</head>
<body>
    <div class="container">
        <div class="content">
            <div class="icon-container">
                <div class="loader" id="loader"></div>
                <div class="check-mark" id="checkMark">✓</div>
                <div class="cross-mark" id="crossMark">✗</div>
            </div>
            <h2 id="title">🔗 Processing Your Request</h2>
            <p id="message">Verifying your access and preparing your link...</p>
            <div class="progress-bar">
                <div class="progress" id="progress"></div>
            </div>
            <p class="countdown">Redirecting in <span id="countdown">3</span> seconds</p>
            <p id="status-message">Please wait...</p>
            <noscript>
                <p class="error">JavaScript is required for automatic redirection.</p>
                <button id="manualRedirect" class="btn" style="display:none;">Continue Manually</button>
            </noscript>
        </div>
    </div>
    <script src="/script.js"></script>
    <!-- Additional security script -->
    <script>
        // Prevent inspection
        (function() {
            // Block inspect element attempts
            document.onkeydown = function(e) {
                if (e.keyCode === 123) { // F12
                    return false;
                }
                if (e.ctrlKey && e.shiftKey && e.keyCode === 'I'.charCodeAt(0)) {
                    return false;
                }
                if (e.ctrlKey && e.shiftKey && e.keyCode === 'J'.charCodeAt(0)) {
                    return false;
                }
                if (e.ctrlKey && e.keyCode === 'U'.charCodeAt(0)) {
                    return false;
                }
            }
        })();
    </script>
</body>
</html>
