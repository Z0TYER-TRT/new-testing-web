<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifying Access...</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="referrer" content="no-referrer">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="stylesheet" href="/style.css">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';">
    
    <!-- Prevent indexing and caching -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
</head>
<body>
    <div class="container">
        <div class="content">
            <div class="icon-container">
                <div class="loader" id="loader"></div>
                <div class="check-mark" id="checkMark">✓</div>
                <div class="cross-mark" id="crossMark">✗</div>
            </div>
            <h2 id="title">🔐 Verifying Access</h2>
            <p id="message">Checking your session...</p>
            <div class="progress-bar">
                <div class="progress" id="progress"></div>
            </div>
            <!-- HIDDEN: No countdown visible to user -->
            <p class="countdown" style="display:none;">
                <span id="countdown">0</span>
            </p>
            <p id="status-message">Please wait...</p>
            <button id="manualRedirect" class="btn" style="display:none;">Retry</button>
        </div>
    </div>
    
    <!-- Main security script -->
    <script src="/script.js"></script>
    
    <!-- Additional inline protection -->
    <script>
        // Prevent any console access
        (function() {
            // Override console completely
            const emptyFunc = function() {};
            const emptyObj = { log: emptyFunc, warn: emptyFunc, error: emptyFunc };
            
            try {
                Object.defineProperty(window, 'console', {
                    get: function() { return emptyObj; },
                    set: function() {}
                });
            } catch(e) {}
            
            // Block keyboard completely on this page
            document.onkeydown = function(e) {
                e = e || window.event;
                // Block everything
                if (e.keyCode) {
                    e.preventDefault();
                    e.stopPropagation();
                    return false;
                }
            };
            
            // Prevent long-press on mobile
            document.addEventListener('touchstart', function(e) {
                if (e.touches.length > 1) {
                    e.preventDefault();
                }
            }, { passive: false });
            
            let lastTouchEnd = 0;
            document.addEventListener('touchend', function(e) {
                const now = Date.now();
                if (now - lastTouchEnd <= 300) {
                    e.preventDefault();
                }
                lastTouchEnd = now;
            }, false);
            
            // Prevent any text selection
            document.onselectstart = function() { return false; };
            document.onmousedown = function() { return false; };
            
        })();
    </script>
</body>
</html>
