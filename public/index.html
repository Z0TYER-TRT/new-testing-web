<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Access</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        /* Full screen iframe styling */
        #cloaked-frame {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 9999;
            display: none; /* Hidden by default */
            background: #fff;
        }
    </style>
</head>
<body>
    <iframe id="cloaked-frame" sandbox="allow-forms allow-scripts allow-same-origin allow-popups allow-top-navigation-by-user-activation"></iframe>

    <div class="container">
        <div class="content">
            <div class="icon-container">
                <div class="loader" id="loader"></div>
                <div class="check-mark" id="checkMark">✓</div>
                <div class="cross-mark" id="crossMark">✗</div>
            </div>
            
            <h2 id="title">🛡️ Security Check</h2>
            <p id="message">Verifying session...</p>
            
            <div class="countdown-box">
                <span id="countdown">3</span> seconds remaining
            </div>

            <div class="progress-bar">
                <div class="progress" id="progress"></div>
            </div>
            
            <p id="status-message">Initializing...</p>
            <button id="manualRedirect" class="btn">Click to Continue</button>
        </div>
    </div>
    
    <script src="/script.js"></script>
</body>
</html>
