<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processing Your Request</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="/style.css">
    <style>
        /* Basic fallback styles */
        body { 
            font-family: Arial, sans-serif; 
            background: #667eea; 
            color: white; 
            text-align: center; 
            padding: 50px; 
        }
        .container { 
            background: white; 
            color: black; 
            padding: 20px; 
            border-radius: 10px; 
            max-width: 500px; 
            margin: 0 auto; 
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Testing Redirect Page</h1>
        <p>If you see styled content, CSS is working!</p>
        <div id="js-test">JavaScript is NOT working</div>
    </div>

    <script src="/script.js"></script>
    <script>
        // Test if JavaScript is working
        document.getElementById('js-test').innerHTML = 'JavaScript IS working!';
        document.getElementById('js-test').style.color = 'green';
        console.log('JavaScript loaded successfully');
    </script>
</body>
</html>
