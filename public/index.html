<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processing Your Request</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <div class="content">
            <div class="loader"></div>
            <h2>🔗 Processing Your Request</h2>
            <p>Verifying your access and preparing your link...</p>
            <div class="progress-bar">
                <div class="progress" id="progress"></div>
            </div>
            <p class="countdown">Redirecting in <span id="countdown">3</span> seconds</p>
            <p id="status-message">Please wait...</p>
            <noscript>
                <p class="error">JavaScript is required for automatic redirection.</p>
                <button id="manualRedirect" class="btn" style="display:none;">Continue Manually</button>
            </noscript>
        </div>
    </div>

    <script src="/script.js"></script>
</body>
</html>
