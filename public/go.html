<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #fff;
            font-family: sans-serif;
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
        }
        #fallback-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
            z-index: 2;
            background: rgba(255,255,255,0.95);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: 1px solid #e0e0e0;
            max-width: 300px;
        }
        #fallback-msg h3 {
            margin: 0 0 10px 0;
            color: #d32f2f;
        }
        #fallback-msg p {
            margin: 0;
            color: #555;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <!-- Removed 'sandbox' attribute to ensure blog loads correctly -->
    <iframe id="content-frame"></iframe>
    <div id="fallback-msg">
        <h3>Loading...</h3>
        <p>Please wait while we securely redirect you.</p>
    </div>

    <script>
        (function() {
            const sessionId = window.location.pathname.split('/').pop();
            const iframe = document.getElementById('content-frame');
            const fallbackMsg = document.getElementById('fallback-msg');
            let redirectTimer = null;

            async function loadTarget() {
                if (!sessionId) return;

                try {
                    const res = await fetch(`/api/process-session/${sessionId}`);
                    const data = await res.json();

                    if (data.success && data.target_url) {
                        console.log("Loading content...");
                        iframe.src = data.target_url;
                        
                        // ✅ IMPROVED SAFETY FALLBACK TIMER (10 Seconds)
                        // Wait 10 seconds for iframe to load.
                        // Many blogs are slow; 5s was too short.
                        redirectTimer = setTimeout(() => {
                            console.warn("Iframe timed out after 10s. Redirecting to URL.");
                            fallbackMsg.querySelector('h3').textContent = "Content Blocked";
                            fallbackMsg.querySelector('p').textContent = "Opening in new tab...";
                            fallbackMsg.style.display = 'block';
                            
                            setTimeout(() => {
                                window.top.location.href = data.target_url;
                            }, 2000);
                        }, 10000);

                        // Try to detect iframe load
                        iframe.onload = () => {
                            console.log("✅ Iframe loaded successfully.");
                            // If iframe loads, clear the timer and hide message
                            if(redirectTimer) clearTimeout(redirectTimer);
                            fallbackMsg.style.display = 'none';
                        };

                    } else {
                        document.body.innerHTML = `<h1 style="font-family: sans-serif; text-align: center; margin-top: 50px; color: #333;">Error: ${data.message || 'Unknown error'}</h1>`;
                    }
                } catch (error) {
                    console.error(error);
                    document.body.innerHTML = `<h1 style="font-family: sans-serif; text-align: center; margin-top: 50px; color: #333;">Connection Failed</h1>`;
                }
            }

            loadTarget();
        })();
    </script>
</body>
</html>
