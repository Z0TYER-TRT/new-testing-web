<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #fff;
            font-family: sans-serif;
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
        }
        #fallback-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
            z-index: 2;
            background: rgba(255,255,255,0.9);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <iframe id="content-frame" sandbox="allow-forms allow-scripts allow-same-origin allow-popups allow-top-navigation-by-user-activation"></iframe>
    <div id="fallback-msg">
        <h3>Content failed to load securely.</h3>
        <p>Redirecting automatically...</p>
    </div>

    <script>
        (function() {
            const sessionId = window.location.pathname.split('/').pop();
            const iframe = document.getElementById('content-frame');
            const fallbackMsg = document.getElementById('fallback-msg');
            let redirectTimer = null;

            async function loadTarget() {
                if (!sessionId) return;

                try {
                    const res = await fetch(`/api/process-session/${sessionId}`);
                    const data = await res.json();

                    if (data.success && data.target_url) {
                        iframe.src = data.target_url;
                        
                        // ✅ SAFETY FALLBACK TIMER
                        // If the iframe is blocked (X-Frame-Options), it often stays blank.
                        // If the iframe doesn't load in 5 seconds, we redirect the whole window.
                        redirectTimer = setTimeout(() => {
                            console.log("Iframe appears blocked or failed to load. Redirecting to URL.");
                            fallbackMsg.style.display = 'block';
                            setTimeout(() => {
                                window.top.location.href = data.target_url;
                            }, 2000);
                        }, 5000);

                        // Try to detect iframe load (Best effort, cross-origin restricted)
                        iframe.onload = () => {
                            console.log("Iframe loaded successfully.");
                            if(redirectTimer) clearTimeout(redirectTimer);
                        };

                    } else {
                        document.body.innerHTML = `<h1 style="font-family: sans-serif; text-align: center; margin-top: 50px;">Error: ${data.message || 'Unknown error'}</h1>`;
                    }
                } catch (error) {
                    console.error(error);
                    document.body.innerHTML = `<h1 style="font-family: sans-serif; text-align: center; margin-top: 50px;">Connection Failed</h1>`;
                }
            }

            loadTarget();
        })();
    </script>
</body>
</html>
