<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <meta name="description" content="Redirecting to your destination...">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔗</text></svg>">
</head>
<body>
    <div class="container">
        <div class="content">
            <div class="loader"></div>
            <h1>Preparing Your Link</h1>
            <p>You're being redirected to your destination...</p>
            <div class="progress-bar">
                <div class="progress"></div>
            </div>
            <p class="countdown">Redirecting in <span id="countdown">3</span> seconds</p>
            <noscript>
                <p class="error">JavaScript is required for automatic redirection.</p>
                <button id="manualRedirect" class="btn">Continue Manually</button>
            </noscript>
        </div>
    </div>
    
    <footer>
        <p>Powered by Your Bot Service</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
